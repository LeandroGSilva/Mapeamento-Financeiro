<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapeamento Financeiro</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F5F4F2;
    --dark: #1A1A1A;
    --gold: #CC4E28;
    --gold-light: #F2C4B2;
    --green: #CC4E28;
    --green-light: #E8724F;
    --red: #A83218;
    --gray: #6B6B6B;
    --border: #E2DFDB;
    --white: #FFFFFF;
    --shadow: 0 4px 24px rgba(0,0,0,0.10);
    --wflow-dark: #1A1A1A;
    --wflow-gold: #CC4E28;
    --wflow-orange: #CC4E28;
    --wflow-orange-light: #F2C4B2;

  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--dark);
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: var(--dark);
    padding: 28px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-title {
    font-family: 'Playfair Display', serif;
    color: var(--gold);
    font-size: 1.4rem;
    font-weight: 600;
    letter-spacing: 0.01em;
  }
  .header-sub {
    color: rgba(255,255,255,0.45);
    font-size: 0.78rem;
    margin-top: 2px;
    font-weight: 300;
  }

  /* PROGRESS */
  .progress-bar {
    background: var(--dark);
    padding: 0 40px 28px;
    display: flex;
    gap: 0;
    align-items: center;
  }
  .step-item {
    display: flex;
    align-items: center;
    flex: 1;
  }
  .step-dot {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    color: rgba(255,255,255,0.4);
    font-weight: 600;
    transition: all 0.4s ease;
    flex-shrink: 0;
    position: relative;
    z-index: 2;
  }
  .step-dot.active {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--dark);
  }
  .step-dot.done {
    background: var(--green);
    border-color: var(--green);
    color: white;
  }
  .step-dot.done::after {
    content: '✓';
    font-size: 0.75rem;
  }
  .step-dot.done span { display: none; }
  .step-line {
    flex: 1;
    height: 2px;
    background: rgba(255,255,255,0.1);
    margin: 0 4px;
    transition: background 0.4s ease;
  }
  .step-line.done { background: var(--green); }
  .step-label {
    display: none;
  }

  /* MAIN */
  .main {
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* SECTION CARD */
  .section-card {
    background: var(--white);
    border-radius: 16px;
    padding: 40px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    animation: fadeUp 0.4s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .section-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--gold-light);
    color: #7A5C1E;
    font-size: 0.72rem;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 20px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.7rem;
    font-weight: 700;
    color: var(--dark);
    line-height: 1.2;
    margin-bottom: 10px;
  }
  .section-desc {
    color: var(--gray);
    font-size: 0.9rem;
    line-height: 1.6;
    margin-bottom: 32px;
    border-left: 3px solid var(--gold);
    padding-left: 14px;
  }

  /* FORM ELEMENTS */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; align-items: start; }
  .form-grid.full { grid-template-columns: 1fr; }
  .form-grid.thirds { grid-template-columns: 1fr 1fr 1fr; }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .field.span2 { grid-column: span 2; }
  .field.span3 { grid-column: span 3; }

  label {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--dark);
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }
  label .req { color: var(--gold); margin-left: 2px; }
  label .hint {
    font-weight: 400;
    text-transform: none;
    font-size: 0.75rem;
    color: var(--gray);
    letter-spacing: 0;
    display: block;
    margin-top: 1px;
  }

  input[type="text"], input[type="email"], input[type="tel"],
  input[type="date"], input[type="number"], select, textarea {
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    color: var(--dark);
    background: var(--cream);
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
    width: 100%;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
    background: white;
  }
  textarea { resize: vertical; min-height: 100px; line-height: 1.5; }
  select { cursor: pointer; }

  /* RADIO / CHECKBOX GROUPS */
  .radio-group, .check-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 2px;
  }
  .radio-group.horizontal {
    flex-direction: row;
    flex-wrap: wrap;
    gap: 10px;
  }
  .radio-opt, .check-opt {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 0.88rem;
    background: var(--cream);
    user-select: none;
  }
  .radio-opt:hover, .check-opt:hover {
    border-color: var(--gold);
    background: #FDF8F0;
  }
  .radio-opt input, .check-opt input { display: none; }
  .radio-opt.selected, .check-opt.selected {
    border-color: var(--gold);
    background: #FDF8F0;
    color: #7A5C1E;
    font-weight: 500;
  }
  .radio-indicator {
    width: 16px; height: 16px;
    border-radius: 50%;
    border: 2px solid var(--border);
    flex-shrink: 0;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .radio-opt.selected .radio-indicator {
    border-color: var(--gold);
    background: var(--gold);
  }
  .radio-opt.selected .radio-indicator::after {
    content: '';
    width: 6px; height: 6px;
    background: white;
    border-radius: 50%;
    display: block;
  }

  /* DIVIDER */
  .divider {
    border: none;
    border-top: 1.5px solid var(--border);
    margin: 28px 0;
  }

  /* REPEATABLE ITEMS */
  .repeat-container { display: flex; flex-direction: column; gap: 16px; }
  .repeat-item {
    background: var(--cream);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    position: relative;
  }
  .repeat-item-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .repeat-item-title {
    font-size: 0.82rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--gray);
  }
  .remove-btn {
    background: none;
    border: 1.5px solid #FFCCD5;
    color: var(--red);
    font-size: 0.75rem;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .remove-btn:hover { background: #FFECEE; }
  .add-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 12px;
    border: 2px dashed var(--gold-light);
    border-radius: 12px;
    background: none;
    color: var(--gold);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }
  .add-btn:hover {
    border-color: var(--gold);
    background: #FDF8F0;
  }

  /* NAVIGATION */
  .nav-buttons {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 36px;
    gap: 12px;
  }
  .btn-back {
    background: none;
    border: 1.5px solid var(--border);
    color: var(--gray);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    padding: 12px 24px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-back:hover { border-color: var(--dark); color: var(--dark); }
  .btn-next {
    background: var(--dark);
    color: var(--gold);
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    padding: 14px 32px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
    letter-spacing: 0.01em;
  }
  .btn-next:hover { background: #333333; transform: translateY(-1px); }
  .btn-submit {
    background: #CC4E28;
    color: white;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    padding: 14px 32px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .btn-submit:hover { background: #A83A1A; transform: translateY(-1px); }

  /* STEP COUNT */
  .step-counter {
    font-size: 0.8rem;
    color: var(--gray);
  }

  /* SUCCESS */
  .success-card {
    text-align: center;
    padding: 60px 40px;
  }
  .success-icon {
    width: 72px; height: 72px;
    background: #CC4E28;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    font-size: 2rem;
  }
  .success-title {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    margin-bottom: 12px;
  }
  .success-desc {
    color: var(--gray);
    font-size: 0.95rem;
    line-height: 1.6;
  }

  /* MONEY INPUT */
  .money-wrap { position: relative; }
  .money-prefix {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    font-size: 0.85rem;
    color: var(--gray);
    font-weight: 600;
    pointer-events: none;
  }
  .money-wrap input { padding-left: 36px; }

  /* PERCENT INPUT */
  .pct-wrap { position: relative; }
  .pct-suffix {
    position: absolute;
    right: 12px; top: 50%;
    transform: translateY(-50%);
    font-size: 0.85rem;
    color: var(--gray);
    font-weight: 600;
    pointer-events: none;
  }
  .pct-wrap input { padding-right: 36px; }

  /* INFO BOX */
  .info-box {
    background: #EFF8F4;
    border: 1.5px solid #B7DFD0;
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 0.85rem;
    color: #2D6A4F;
    line-height: 1.5;
    margin-bottom: 20px;
  }
  .info-box strong { font-weight: 600; }

  @media (max-width: 600px) {
    .header { padding: 20px; }
    .progress-bar { padding: 0 20px 20px; }
    .main { padding: 24px 16px 60px; }
    .section-card { padding: 24px 20px; }
    .form-grid { grid-template-columns: 1fr; }
    .form-grid.thirds { grid-template-columns: 1fr; }
    .field.span2, .field.span3 { grid-column: span 1; }
    .section-title { font-size: 1.4rem; }
  }
</style>
</head>

    </div>
    <div id="headerText" style="display:none;">
      <div class="header-title">WFLOW</div>
    </div>
  </div>
  <div style="text-align:right;">
    <div class="header-sub" style="color:rgba(255,255,255,0.5);font-size:0.75rem;">Mapeamento Financeiro</div>
    <div class="header-sub" style="color:var(--gold);font-size:0.7rem;font-weight:500;">Credenciada à XP Investimentos</div>
  </div>
</div>

<div class="progress-bar" id="progressBar"></div>

<div class="main">
  <div id="formContainer"></div>
</div>

<script>
const STEPS = [
  { label: 'Dados', icon: '1' },
  { label: 'Família', icon: '2' },
  { label: 'Objetivos', icon: '3' },
  { label: 'Renda', icon: '4' },
  { label: 'Patrimônio', icon: '5' },
];

let currentStep = 0;
let formData = {};
let showingWelcome = true;

function renderWelcome() {
  document.getElementById('progressBar').style.display = 'none';
  return `
    <div class="section-card" style="padding:0;overflow:hidden;">
      <!-- Hero banner -->
      <div style="background:var(--wflow-dark);padding:48px 40px 40px;text-align:center;position:relative;">
        <div style="position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,rgba(200,168,75,0.08) 0%,transparent 60%);pointer-events:none;"></div>
        <h1 style="font-family:'Playfair Display',serif;color:#FFFFFF;font-size:1.9rem;font-weight:700;line-height:1.25;margin-bottom:12px;">
          Mapeamento Financeiro
        </h1>
      </div>

      <!-- Conteúdo -->
      <div style="padding:40px;">
        <p style="font-size:1.05rem;color:var(--dark);line-height:1.75;margin-bottom:24px;">
          Olá! Seja bem-vindo ao seu <strong>Mapeamento Financeiro Personalizado</strong>. Este formulário foi desenvolvido para que seu assessor possa compreender de forma completa a sua realidade financeira — renda, despesas, patrimônio, objetivos e sonhos de vida.
        </p>

        <div style="background:#F8F6F0;border-left:4px solid var(--gold);border-radius:0 10px 10px 0;padding:20px 22px;margin-bottom:24px;">
          <p style="font-size:0.95rem;color:var(--dark);line-height:1.7;">
            Com base nas suas respostas, será construída uma <strong>análise detalhada da sua vida financeira</strong>, considerando seus objetivos de curto, médio e longo prazo — da formação de reservas à aposentadoria planejada — sempre aliada a uma carteira de investimentos <strong>aderente ao seu perfil de investidor</strong>.
          </p>
        </div>

        <p style="font-size:0.95rem;color:var(--dark);line-height:1.7;margin-bottom:24px;">
          Quanto mais completas forem suas respostas, mais precisa e eficiente será a estratégia elaborada para você. Se não souber algum valor exato, estimativas são bem-vindas.
        </p>

        <!-- Destaques -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:32px;">
          ${[
            ['🔒','Sigilo total','Suas informações são tratadas com absoluta confidencialidade.'],
            ['🎯','Foco nos seus objetivos','O planejamento é construído em torno do que importa para você.'],
            ['📊','Análise personalizada','Estratégias alinhadas ao seu perfil e momento de vida.'],
            ['🤝','Acompanhamento contínuo','Seu assessor estará ao lado em cada etapa do caminho.'],
          ].map(([icon,title,desc]) => `
            <div style="background:#F8F6F0;border:1.5px solid var(--border);border-radius:12px;padding:16px;">
              <div style="font-size:1.4rem;margin-bottom:6px;">${icon}</div>
              <div style="font-size:0.82rem;font-weight:700;color:var(--dark);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.03em;">${title}</div>
              <div style="font-size:0.8rem;color:var(--gray);line-height:1.5;">${desc}</div>
            </div>`).join('')}
        </div>

        <p style="font-size:0.82rem;color:var(--gray);margin-bottom:28px;line-height:1.6;">
          O preenchimento leva em média <strong>10 a 15 minutos</strong> e está dividido em <strong>5 etapas</strong>: dados pessoais, estrutura familiar, objetivos, rendas e despesas, e patrimônio.
        </p>

        <button class="btn-next" onclick="startForm()" style="width:100%;justify-content:center;font-size:1rem;padding:16px;">
          Começar meu mapeamento →
        </button>
      </div>
    </div>`;
}

function startForm() {
  showingWelcome = false;
  document.getElementById('progressBar').style.display = 'flex';
  rerenderSection();
}

// ---- Render progress ----
function renderProgress() {
  const bar = document.getElementById('progressBar');
  bar.innerHTML = STEPS.map((s, i) => {
    let cls = i < currentStep ? 'done' : i === currentStep ? 'active' : '';
    let line = i < STEPS.length - 1 ? `<div class="step-line ${i < currentStep ? 'done' : ''}"></div>` : '';
    return `
      <div class="step-item">
        <div class="step-dot ${cls}">
          <span>${s.icon}</span>
        </div>
        ${line}
      </div>`;
  }).join('');
}

// ---- Nav Buttons ----
function navButtons(isLast = false) {
  const total = STEPS.length;
  return `
    <div class="nav-buttons">
      <div>
        ${currentStep > 0 ? `<button class="btn-back" onclick="prevStep()">← Voltar</button>` : '<span></span>'}
      </div>
      <div style="display:flex;align-items:center;gap:16px;">
        <span class="step-counter">${currentStep + 1} de ${total}</span>
        ${isLast
          ? `<button class="btn-submit" onclick="submitForm()">✓ Enviar Mapeamento</button>`
          : `<button class="btn-next" onclick="nextStep()">Continuar →</button>`}
      </div>
    </div>`;
}

// ---- STEP 1: Dados Pessoais ----
function renderStep0() {
  return `
    <div class="section-card">
      <div class="section-badge">📋 Etapa 1 de 5</div>
      <h2 class="section-title">Dados Pessoais</h2>
      <p class="section-desc">Informações básicas para identificação e contato. Todas as informações são tratadas com total confidencialidade.</p>

      <div class="form-grid">
        <div class="field span2">
          <label>Nome completo <span class="req">*</span></label>
          <input type="text" id="nome" placeholder="Seu nome completo" value="${formData.nome||''}">
        </div>
        <div class="field">
          <label>CPF <span class="req">*</span></label>
          <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" value="${formData.cpf||''}" oninput="maskCPF(this)">
        </div>
        <div class="field">
          <label>Data de nascimento <span class="req">*</span></label>
          <input type="date" id="nascimento" value="${formData.nascimento||''}">
        </div>
        <div class="field">
          <label>Celular <span class="req">*</span></label>
          <input type="tel" id="celular" placeholder="(11) 99999-9999" value="${formData.celular||''}" oninput="maskPhone(this)">
        </div>
        <div class="field">
          <label>E-mail <span class="req">*</span></label>
          <input type="email" id="email" placeholder="seu@email.com" value="${formData.email||''}">
        </div>
        <div class="field span2">
          <label>Profissão</label>
          <input type="text" id="profissao" placeholder="Ex: Empresário, Médico, Engenheiro..." value="${formData.profissao||''}">
        </div>
      </div>

      <hr class="divider">

      <div class="field" style="margin-bottom:18px;">
        <label>Estado civil <span class="req">*</span></label>
        <div class="radio-group" id="estadoCivilGroup">
          ${['Solteiro(a)','Casado(a) com brasileiro(a) nato(a)','Casado(a) com brasileiro(a) naturalizado(a)','Casado(a) com estrangeiro(a)','União Estável','Desquitado(a)','Divorciado(a)','Viúvo(a)']
            .map(opt => `<label class="radio-opt ${formData.estadoCivil===opt?'selected':''}" onclick="selectRadio('estadoCivil','${opt}',this)">
              <input type="radio" name="estadoCivil" value="${opt}">
              <div class="radio-indicator"></div> ${opt}
            </label>`).join('')}
        </div>
      </div>

      <div class="field" style="margin-bottom:18px;">
        <label>Regime da união <span class="req">*</span></label>
        <div class="radio-group" id="regimeGroup">
          ${['Não se aplica','Comunhão universal de bens','Comunhão parcial de bens','Separação total de bens','Participação final nos aquestos','Regime personalizado','Regime misto']
            .map(opt => `<label class="radio-opt ${formData.regime===opt?'selected':''}" onclick="selectRadio('regime','${opt}',this)">
              <input type="radio" name="regime" value="${opt}">
              <div class="radio-indicator"></div> ${opt}
            </label>`).join('')}
        </div>
      </div>

      <div class="form-grid">
        <div class="field">
          <label>Dupla cidadania? <span class="req">*</span></label>
          <div class="radio-group horizontal">
            ${['Sim','Não'].map(opt => `<label class="radio-opt ${formData.duplaCidadania===opt?'selected':''}" onclick="selectRadio('duplaCidadania','${opt}',this)" style="flex:1">
              <input type="radio" name="duplaCidadania" value="${opt}">
              <div class="radio-indicator"></div> ${opt}
            </label>`).join('')}
          </div>
        </div>
        <div class="field">
          <label>Realizou/realizará saída fiscal? <span class="req">*</span></label>
          <div class="radio-group horizontal">
            ${['Sim','Não'].map(opt => `<label class="radio-opt ${formData.saidaFiscal===opt?'selected':''}" onclick="selectRadio('saidaFiscal','${opt}',this)" style="flex:1">
              <input type="radio" name="saidaFiscal" value="${opt}">
              <div class="radio-indicator"></div> ${opt}
            </label>`).join('')}
          </div>
        </div>
        <div class="field">
          <label>Esporte de interesse</label>
          <input type="text" id="esporte" placeholder="Ex: Tênis, Futebol, Golf..." value="${formData.esporte||''}">
        </div>
        <div class="field">
          <label>Hobby de interesse</label>
          <input type="text" id="hobby" placeholder="Ex: Viagens, Leitura, Culinária..." value="${formData.hobby||''}">
        </div>
      </div>

      ${navButtons(false)}
    </div>`;
}

// ---- STEP 2: Estrutura Familiar ----
function renderStep1() {
  if (!formData.familiares) formData.familiares = [];
  return `
    <div class="section-card">
      <div class="section-badge">👨‍👩‍👧 Etapa 2 de 5</div>
      <h2 class="section-title">Estrutura Familiar</h2>
      <p class="section-desc">Informe os membros da família que participam ou impactam diretamente seu orçamento — cônjuge, filhos, pais ou outros dependentes financeiros. Não inclua você mesmo.</p>

      <div class="repeat-container" id="familiaresContainer">
        ${formData.familiares.map((f,i) => renderFamiliar(i,f)).join('')}
      </div>
      <button class="add-btn" onclick="addFamiliar()">+ Adicionar membro da família</button>

      ${navButtons(false)}
    </div>`;
}

function renderFamiliar(i, f={}) {
  const parentescos = ['Cônjuge','Filho(a)','Pai','Mãe','Irmão(ã)','Avô(ó)','Primo(a)','Amigo(a)','Outro'];
  return `
    <div class="repeat-item" id="familiar-${i}">
      <div class="repeat-item-header">
        <span class="repeat-item-title">Membro ${i+1}</span>
        <button class="remove-btn" onclick="removeFamiliar(${i})">Remover</button>
      </div>
      <div class="form-grid">
        <div class="field span2">
          <label>Nome completo</label>
          <input type="text" placeholder="Nome do membro" value="${f.nome||''}" onchange="updateFamiliar(${i},'nome',this.value)">
        </div>
        <div class="field">
          <label>Grau de parentesco</label>
          <select onchange="updateFamiliar(${i},'parentesco',this.value)">
            <option value="">Selecione...</option>
            ${parentescos.map(p => `<option value="${p}" ${f.parentesco===p?'selected':''}>${p}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label>Data de nascimento</label>
          <input type="date" value="${f.nascimento||''}" onchange="updateFamiliar(${i},'nascimento',this.value)">
        </div>
        <div class="field span2">
          <label>Dependente para Imposto de Renda?</label>
          <div class="radio-group horizontal">
            ${['Sim','Não'].map(opt => `<label class="radio-opt ${f.dependenteIR===opt?'selected':''}" onclick="updateFamiliarRadio(${i},'dependenteIR','${opt}',this)" style="flex:1">
              <div class="radio-indicator"></div> ${opt}
            </label>`).join('')}
          </div>
        </div>
      </div>
    </div>`;
}

function addFamiliar() {
  formData.familiares.push({});
  rerenderSection();
}
function removeFamiliar(i) {

function removeImovel(i) { formData.imoveis.splice(i,1); rerenderSection(); }
function updateImovel(i,f,v) { if(!formData.imoveis[i]) formData.imoveis[i]={}; formData.imoveis[i][f]=v; if(f==='financiado') rerenderSection(); }
function addVeiculo() { formData.veiculos.push({}); rerenderSection(); }
function removeVeiculo(i) { formData.veiculos.splice(i,1); rerenderSection(); }
function updateVeiculo(i,f,v) { if(!formData.veiculos[i]) formData.veiculos[i]={}; formData.veiculos[i][f]=v; }
function addParticipacao() { formData.participacoes.push({}); rerenderSection(); }
function removeParticipacao(i) { formData.participacoes.splice(i,1); rerenderSection(); }
function updateParticipacao(i,f,v) { if(!formData.participacoes[i]) formData.participacoes[i]={}; formData.participacoes[i][f]=v; }

// ---- Collect step 0 ----
function collectStep0() {
  formData.nome = document.getElementById('nome')?.value || '';
  formData.cpf = document.getElementById('cpf')?.value || '';
  formData.nascimento = document.getElementById('nascimento')?.value || '';
  formData.celular = document.getElementById('celular')?.value || '';
  formData.email = document.getElementById('email')?.value || '';
  formData.profissao = document.getElementById('profissao')?.value || '';
  formData.esporte = document.getElementById('esporte')?.value || '';
  formData.hobby = document.getElementById('hobby')?.value || '';
}

function collectStep2() {
  formData.idadeAposent = document.getElementById('idadeAposent')?.value || '';
  formData.rendaAposent = document.getElementById('rendaAposent')?.value || '';
  formData.expectativa = document.getElementById('expectativa')?.value || '';
}

// ---- Radio selection ----
function selectRadio(field, value, el) {
  formData[field] = value;
  el.closest('.radio-group').querySelectorAll('.radio-opt').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
}

// ---- Masks ----
function maskCPF(el) {
  let v = el.value.replace(/\D/g,'');
  if(v.length>11) v=v.slice(0,11);
  v = v.replace(/(\d{3})(\d)/,'$1.$2');
  v = v.replace(/(\d{3})(\d)/,'$1.$2');
  v = v.replace(/(\d{3})(\d{1,2})$/,'$1-$2');
  el.value = v;
}
function maskPhone(el) {
  let v = el.value.replace(/\D/g,'');
  if(v.length>11) v=v.slice(0,11);
  v = v.replace(/^(\d{2})(\d)/,'($1) $2');
  v = v.replace(/(\d{5})(\d)/,'$1-$2');
  el.value = v;
}

// ---- Navigation ----
function saveCurrentStep() {
  if(currentStep===0) collectStep0();
  if(currentStep===2) collectStep2();
  // Always try to collect step2 fields if they're present (in case user is on step2)
  const idadeEl = document.getElementById('idadeAposent');
  const rendaEl = document.getElementById('rendaAposent');
  const expectEl = document.getElementById('expectativa');
  if(idadeEl && idadeEl.value) formData.idadeAposent = idadeEl.value;
  if(rendaEl && rendaEl.value) formData.rendaAposent = rendaEl.value;
  if(expectEl && expectEl.value) formData.expectativa = expectEl.value;
}

function nextStep() {
  saveCurrentStep();
  if(currentStep < STEPS.length - 1) {
    currentStep++;
    rerenderSection();
    window.scrollTo({top:0, behavior:'smooth'});
  }
}

function prevStep() {
  saveCurrentStep();
  if(currentStep > 0) {
    currentStep--;
    rerenderSection();
    window.scrollTo({top:0, behavior:'smooth'});
  }
}

function rerenderSection() {
  renderProgress();
  const container = document.getElementById('formContainer');
  const renders = [renderStep0, renderStep1, renderStep2, renderStep3, renderStep4];
  container.innerHTML = renders[currentStep]();
}

function formatMoney(v) {
  if(!v) return 'Não informado';
  return 'R$ ' + Number(v).toLocaleString('pt-BR', {minimumFractionDigits:2});
}

function submitForm() {
  saveCurrentStep();

  const d = formData;
  let msg = '';

  function fmtDate(v) {
    if(!v) return '—';
    const [y,m,d] = v.split('-');
    return d ? `${d}/${m}/${y}` : v;
  }

  msg += '*MAPEAMENTO FINANCEIRO*\n';
  msg += '========================\n\n';

  msg += '*DADOS PESSOAIS*\n';
  msg += `• Nome: ${d.nome||'—'}\n`;
  msg += `• CPF: ${d.cpf||'—'}\n`;
  msg += `• Nascimento: ${fmtDate(d.nascimento)}\n`;
  msg += `• Celular: ${d.celular||'—'}\n`;
  msg += `• E-mail: ${d.email||'—'}\n`;
  msg += `• Profissão: ${d.profissao||'—'}\n`;
  msg += `• Estado civil: ${d.estadoCivil||'—'}\n`;
  msg += `• Regime da união: ${d.regime||'—'}\n`;
  msg += `• Dupla cidadania: ${d.duplaCidadania||'—'}\n`;
  msg += `• Saída fiscal: ${d.saidaFiscal||'—'}\n`;
  msg += `• Esporte: ${d.esporte||'—'}\n`;
  msg += `• Hobby: ${d.hobby||'—'}\n\n`;

  msg += '*ESTRUTURA FAMILIAR*\n';
  if(d.familiares && d.familiares.length > 0) {
    d.familiares.forEach((f,i) => {
      msg += `• Membro ${i+1}: ${f.nome||'—'} | ${f.parentesco||'—'} | Nasc: ${fmtDate(f.nascimento)} | Dep. IR: ${f.dependenteIR||'—'}\n`;
    });
  } else { msg += '• Nenhum membro informado\n'; }
  msg += '\n';

  msg += '*OBJETIVOS*\n';
  msg += `• Aposentadoria aos: ${d.idadeAposent||'—'} anos\n`;
  msg += `• Renda desejada: ${formatMoney(d.rendaAposent)}/mes\n`;
  msg += `• Expectativa de vida: ${d.expectativa||'—'} anos\n`;
  if(d.objetivos && d.objetivos.length > 0) {
    msg += `• Objetivos secundarios:\n`;
    d.objetivos.forEach((o,i) => {
      msg += `  ${i+1}. ${o.nome||'—'} | Idade: ${o.idade||'—'} | ${o.frequencia||'—'}`;
      if(o.frequencia==='Parcelado') msg += ` | Parcela: ${formatMoney(o.valorParcela)} x ${o.anos||'—'} anos`;
      else if(o.valorTotal) msg += ` | Total: ${formatMoney(o.valorTotal)}`;
      msg += '\n';
    });
  }
  msg += '\n';

  msg += '*RENDAS MENSAIS*\n';
  if(d.rendas && d.rendas.length > 0) {
    d.rendas.forEach((r,i) => {
      msg += `• ${r.responsavel||'—'} | ${r.categoria||'—'} | ${formatMoney(r.valor)}\n`;
    });
  } else { msg += '• Nenhuma renda informada\n'; }
  msg += '\n';

  msg += '*DESPESAS MENSAIS*\n';
  if(d.despesas && d.despesas.length > 0) {
    d.despesas.forEach((e,i) => {
      msg += `• ${e.responsavel||'—'} | ${e.categoria||'—'} | ${formatMoney(e.valor)}\n`;
    });
  } else { msg += '• Nenhuma despesa informada\n'; }
  msg += '\n';

  msg += '*INVESTIMENTOS NACIONAIS*\n';
  if(d.invNacionais && d.invNacionais.length > 0) {
    d.invNacionais.forEach((inv,i) => {
      msg += `• ${inv.tipo||'—'} | ${inv.inst||'—'} | ${formatMoney(inv.valor)} | Ref: ${inv.data||'—'}\n`;
    });
  } else { msg += '• Nenhum informado\n'; }
  msg += '\n';

  msg += '*INVESTIMENTOS GLOBAIS*\n';
  if(d.invGlobais && d.invGlobais.length > 0) {
    d.invGlobais.forEach((inv,i) => {
      msg += `• ${inv.inst||'—'} | US$ ${inv.valor||'—'} | Ref: ${inv.data||'—'}\n`;
      const cats = ['CDs','Mutual Funds','Treasury','Bonds','Equities','Cash','Structured Notes'];
      const pcts = cats.filter(c=>inv[c]).map(c=>`${c}: ${inv[c]}%`).join(', ');
      if(pcts) msg += `  Alocacao: ${pcts}\n`;
    });
  } else { msg += '• Nenhum informado\n'; }
  msg += '\n';

  msg += '*IMOVEIS*\n';
  if(d.imoveis && d.imoveis.length > 0) {
    d.imoveis.forEach((im,i) => {
      msg += `• ${im.local||'—'} | ${formatMoney(im.valor)} | Financiado: ${im.financiado||'—'} | Participacao: ${im.participacao||'—'}%\n`;
    });
  } else { msg += '• Nenhum informado\n'; }
  msg += '\n';

  msg += '*VEICULOS*\n';
  if(d.veiculos && d.veiculos.length > 0) {
    d.veiculos.forEach((v,i) => {
      msg += `• ${v.desc||'—'} (${v.tipo||'—'}) | ${formatMoney(v.valor)} | Financiado: ${v.financiado||'—'}\n`;
    });
  } else { msg += '• Nenhum informado\n'; }
  msg += '\n';

  msg += '*PARTICIPACOES SOCIETARIAS*\n';
  if(d.participacoes && d.participacoes.length > 0) {
    d.participacoes.forEach((p,i) => {
      msg += `• ${p.nome||'—'} | CNPJ: ${p.cnpj||'—'} | ${formatMoney(p.valor)} | ${p.participacao||'—'}%\n`;
    });
  } else { msg += '• Nenhuma informada\n'; }

  msg += '\n========================\n';
  msg += 'Mapeamento financeiro concluido.';

  const phone = '5511999250282';
  const url = 'https://wa.me/' + phone + '?text=' + encodeURIComponent(msg);
  window.open(url, '_blank');

  document.getElementById('formContainer').innerHTML = `
    <div class="section-card success-card">
      <div class="success-icon">✓</div>
      <h2 class="success-title">Mapeamento enviado!</h2>
      <p class="success-desc">O WhatsApp foi aberto com todas as suas informações organizadas e já enviadas para o seu assessor.<br><br>Em breve você receberá um retorno. 😊</p>
    </div>`;
  document.getElementById('progressBar').innerHTML = '';
}

// ---- Init ----
document.getElementById('progressBar').style.display = 'none';
document.getElementById('formContainer').innerHTML = renderWelcome();
renderProgress();
</script>
